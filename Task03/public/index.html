<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>НОД - игра</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, button { padding: 8px; margin: 5px; }
        .question { font-size: 24px; margin: 20px 0; }
        .result { margin-top: 20px; }
        .correct { color: green; }
        .wrong { color: red; }
    </style>
</head>
<body>
    <h1>Наибольший общий делитель</h1>
    
    <div id="start-screen">
        <label>Ваше имя:</label>
        <input type="text" id="player-name">
        <button onclick="startGame()">Начать игру</button>
    </div>
    
    <div id="game-screen" style="display:none;">
        <p>Игрок: <span id="player-name-display"></span></p>
        <p>Счет: <span id="score">0</span></p>
        <p>Раунд: <span id="round">1</span> из 3</p>
        <div class="question">
            НОД(<span id="num1"></span>, <span id="num2"></span>) = ?
        </div>
        <input type="number" id="answer" placeholder="Введите ответ">
        <button onclick="submitAnswer()">Ответить</button>
        <div id="result" class="result"></div>
    </div>
    
    <div id="end-screen" style="display:none;">
        <h2>Игра завершена!</h2>
        <p>Игрок: <span id="final-player-name"></span></p>
        <p>Правильных ответов: <span id="final-score"></span> из 3</p>
        <button onclick="restartGame()">Новая игра</button>
    </div>
    
    <hr>
    <div>
        <h3>История игр</h3>
        <button onclick="loadGames()">Загрузить историю</button>
        <div id="games-list"></div>
    </div>

    <script>
        let currentGameId = null;
        let currentRound = 1;
        let currentScore = 0;
        let totalRounds = 3;
        
        function startGame() {
            const playerName = document.getElementById('player-name').value;
            if (!playerName) {
                alert('Введите имя');
                return;
            }
            
            fetch('/games', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_name: playerName })
            })
            .then(response => response.json())
            .then(data => {
                currentGameId = data.game_id;
                currentRound = data.round;
                currentScore = data.score;
                
                document.getElementById('player-name-display').innerText = playerName;
                document.getElementById('score').innerText = currentScore;
                document.getElementById('round').innerText = currentRound;
                document.getElementById('num1').innerText = data.num1;
                document.getElementById('num2').innerText = data.num2;
                
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('result').innerHTML = '';
                document.getElementById('answer').value = '';
            });
        }
        
        function submitAnswer() {
            const answer = document.getElementById('answer').value;
            const num1 = parseInt(document.getElementById('num1').innerText);
            const num2 = parseInt(document.getElementById('num2').innerText);
            
            fetch(`/step/${currentGameId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    answer: answer,
                    num1: num1,
                    num2: num2,
                    round: currentRound,
                    score: currentScore
                })
            })
            .then(response => response.json())
            .then(data => {
                const resultDiv = document.getElementById('result');
                if (data.is_correct) {
                    resultDiv.innerHTML = '<p class="correct">Верно!</p>';
                } else {
                    resultDiv.innerHTML = `<p class="wrong">Неверно! Правильный ответ: ${data.correct_answer}</p>`;
                }
                
                if (data.is_game_over) {
                    document.getElementById('final-player-name').innerText = document.getElementById('player-name-display').innerText;
                    document.getElementById('final-score').innerText = data.score;
                    document.getElementById('game-screen').style.display = 'none';
                    document.getElementById('end-screen').style.display = 'block';
                } else {
                    currentRound = data.next_round;
                    currentScore = data.score;
                    document.getElementById('score').innerText = currentScore;
                    document.getElementById('round').innerText = currentRound;
                    document.getElementById('num1').innerText = data.num1;
                    document.getElementById('num2').innerText = data.num2;
                    document.getElementById('answer').value = '';
                }
            });
        }
        
        function restartGame() {
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
            document.getElementById('player-name').value = '';
            currentGameId = null;
        }
        
        function loadGames() {
            fetch('/games')
                .then(response => response.json())
                .then(games => {
                    const gamesList = document.getElementById('games-list');
                    if (games.length === 0) {
                        gamesList.innerHTML = '<p>Нет сохраненных игр</p>';
                        return;
                    }
                    let html = '<ul>';
                    games.forEach(game => {
                        html += `<li>${game.player_name} - ${game.score}/${game.total_rounds} (${game.game_date})</li>`;
                    });
                    html += '</ul>';
                    gamesList.innerHTML = html;
                });
        }
    </script>
</body>
</html>
